openapi: 3.0.3
info:
  title: BookingService API
  description: |
    Orchestrierungs-Service für Reisebuchungen.

    Dieser Service koordiniert Buchungen über die drei Teilservices (Flight, Hotel, Car)
    und bietet eine einheitliche API für kombinierte Reisebuchungen.

    ## Angebote abfragen (Story 1)

    Über `GET /booking/offers` können verfügbare Reiseoptionen abgefragt werden.
    Der BookingService ruft dabei FlightService, HotelService und CarService parallel ab
    und kombiniert die Ergebnisse zu einer einheitlichen Antwort.

    ## Buchungsablauf (Stories 4-6)

    1. Kunde sucht verfügbare Optionen über GET /booking/offers
    2. Kunde erstellt eine kombinierte Buchung über POST /bookings
    3. Der Booking Service orchestriert die Teilbuchungen mittels SAGA-Pattern
    4. Kunde erhält eine Gesamtbuchung mit allen Teilbuchungen

    ## SAGA-Pattern (All-or-Nothing)

    Der Booking Service implementiert das SAGA-Pattern für verteilte Transaktionen:

    - Bei Erfolg aller Teilbuchungen: Status `CONFIRMED`
    - Bei Fehler einer Teilbuchung: Automatischer Rollback bereits erfolgter Buchungen
    - Compensating Transactions stornieren bereits getätigte Buchungen

    **Beispiel:** Flug gebucht → Hotel fehlgeschlagen → Flug wird automatisch storniert
  version: 1.0.0

servers:
  - url: http://localhost:8085
    description: Lokaler Entwicklungsserver

paths:
  /health/live:
    get:
      summary: Liveness-Check
      description: |
        Gibt den Liveness-Status des Services zurück.
        Prüft nur, ob der Service-Prozess selbst läuft, nicht die Erreichbarkeit abhängiger Services.
      operationId: getLiveness
      tags:
        - System
      responses:
        '200':
          description: Service-Prozess läuft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessResponse'

  /health/ready:
    get:
      summary: Readiness-Check
      description: |
        Gibt den Readiness-Status des Services zurück.
        Prüft die Erreichbarkeit aller abhängigen Services (Flight, Hotel, Car).
      operationId: getReadiness
      tags:
        - System
      responses:
        '200':
          description: Readiness-Status mit Details zu abhängigen Services
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'

  /openapi:
    get:
      summary: OpenAPI-Spezifikation
      description: Gibt die OpenAPI-Spezifikation des Services zurück
      operationId: getOpenApi
      tags:
        - System
      responses:
        '200':
          description: OpenAPI-Spezifikation
          content:
            application/x-yaml:
              schema:
                type: string

  /booking/offers:
    get:
      summary: Verfügbare Reiseoptionen abfragen
      description: |
        Ruft FlightService, HotelService und CarService parallel ab und kombiniert
        die Ergebnisse zu einer einheitlichen Antwort mit allen verfügbaren Optionen.
      operationId: getOffers
      tags:
        - Offers
      responses:
        '200':
          description: Verfügbare Reiseoptionen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OffersResponse'
              example:
                flights:
                  - id: LH123
                    origin: Frankfurt
                    destination: New York
                    price: 450
                    currency: EUR
                  - id: LH456
                    origin: München
                    destination: London
                    price: 180
                    currency: EUR
                hotels:
                  - id: H1
                    name: Manhattan Plaza Hotel
                    price: 250
                    currency: USD
                    unit: night
                  - id: H2
                    name: London City Inn
                    price: 150
                    currency: GBP
                    unit: night
                cars:
                  - id: C1
                    model: Ford Mustang
                    price: 95
                    currency: USD
                    unit: day
                  - id: C2
                    model: BMW 3er
                    price: 75
                    currency: EUR
                    unit: day

  /bookings:
    post:
      summary: Neue Buchung erstellen
      description: |
        Erstellt eine kombinierte Reisebuchung mittels SAGA-Pattern.

        Mindestens `customerName` ist erforderlich. Alle anderen Felder (flightId, hotelId, carId)
        sind optional - es muss aber mindestens ein Service gebucht werden.

        **SAGA-Verhalten:**
        - Bei Erfolg aller Teilbuchungen: HTTP 201, Status `CONFIRMED`
        - Bei Fehler: HTTP 409, Status `FAILED`, bereits erfolgte Buchungen werden automatisch storniert
      operationId: createBooking
      tags:
        - Bookings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
            examples:
              vollstaendig:
                summary: Vollständige Buchung
                value:
                  customerName: Max Mustermann
                  customerEmail: max@example.com
                  flightId: LH123
                  hotelId: H1
                  carId: C1
                  checkIn: "2024-06-01"
                  checkOut: "2024-06-05"
              nurFlug:
                summary: Nur Flug
                value:
                  customerName: Max Mustermann
                  flightId: LH123
              flugUndHotel:
                summary: Flug und Hotel
                value:
                  customerName: Max Mustermann
                  flightId: LH456
                  hotelId: H2
                  checkIn: "2024-06-01"
                  checkOut: "2024-06-03"
      responses:
        '201':
          description: Buchung erfolgreich - alle Teilbuchungen bestätigt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
              example:
                id: BK-20240601-001
                customerName: Max Mustermann
                status: CONFIRMED
                createdAt: "2024-05-15T10:30:00Z"
                flight:
                  bookingRef: FB-001
                  flightId: LH123
                  status: CONFIRMED
                hotel:
                  bookingRef: HB-001
                  hotelId: H1
                  status: CONFIRMED
                car:
                  bookingRef: CB-001
                  carId: C1
                  status: CONFIRMED
        '409':
          description: |
            Konflikt - mindestens eine Teilbuchung fehlgeschlagen.
            SAGA-Rollback wurde durchgeführt, bereits erfolgte Buchungen wurden storniert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
              example:
                id: BK-20240601-002
                customerName: Max Mustermann
                status: FAILED
                error: "Hotel H1 not available for requested dates"
                createdAt: "2024-05-15T10:30:00Z"
                flight:
                  bookingRef: FB-001
                  flightId: LH123
                  status: ROLLED_BACK
                  note: "Booking was created and then cancelled due to saga rollback"
                hotel:
                  hotelId: H1
                  status: FAILED
                  error: "No rooms available"
                car:
                  carId: C1
                  status: NOT_ATTEMPTED
                  note: "Booking was not attempted due to previous failure"
        '400':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

    get:
      summary: Alle Buchungen auflisten
      description: Gibt eine Liste aller Buchungen zurück
      operationId: getBookings
      tags:
        - Bookings
      responses:
        '200':
          description: Liste der Buchungen
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookingSummary'

  /bookings/{id}:
    get:
      summary: Buchungsdetails abrufen
      description: Gibt die vollständigen Details einer Buchung zurück
      operationId: getBookingById
      tags:
        - Bookings
      parameters:
        - name: id
          in: path
          required: true
          description: Buchungs-ID (z.B. BK-20240601-001)
          schema:
            type: string
      responses:
        '200':
          description: Buchungsdetails
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          description: Buchung nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: NOT_FOUND
                message: Booking BK-20240601-999 not found

    delete:
      summary: Buchung stornieren
      description: |
        Storniert eine bestehende Buchung.

        Alle Teilbuchungen (Flug, Hotel, Mietwagen) werden bei den jeweiligen Services storniert.
      operationId: cancelBooking
      tags:
        - Bookings
      parameters:
        - name: id
          in: path
          required: true
          description: Buchungs-ID
          schema:
            type: string
      responses:
        '200':
          description: Buchung erfolgreich storniert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
              example:
                id: BK-20240601-001
                customerName: Max Mustermann
                status: CANCELLED
                flight:
                  bookingRef: FB-001
                  status: CANCELLED
                hotel:
                  bookingRef: HB-001
                  status: CANCELLED
                car:
                  bookingRef: CB-001
                  status: CANCELLED
        '404':
          description: Buchung nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    LivenessResponse:
      type: object
      properties:
        status:
          type: string
          example: UP

    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - UP
            - DEGRADED
            - DOWN
          description: |
            Gesamtstatus des Services:
            - `UP`: Alle abhängigen Services erreichbar
            - `DEGRADED`: Mindestens ein Service erreichbar, aber nicht alle
            - `DOWN`: Kein abhängiger Service erreichbar
          example: UP
        services:
          type: object
          description: Status der abhängigen Services
          properties:
            flight:
              type: string
              enum: [UP, DOWN]
              example: UP
            hotel:
              type: string
              enum: [UP, DOWN]
              example: UP
            car:
              type: string
              enum: [UP, DOWN]
              example: UP

    OffersResponse:
      type: object
      description: Kombinierte Antwort mit verfügbaren Reiseoptionen aller Services
      properties:
        flights:
          type: array
          description: Verfügbare Flüge vom FlightService
          items:
            type: object
            properties:
              id:
                type: string
                example: LH123
              origin:
                type: string
                example: Frankfurt
              destination:
                type: string
                example: New York
              price:
                type: number
                format: float
                example: 450
              currency:
                type: string
                example: EUR
        hotels:
          type: array
          description: Verfügbare Hotels vom HotelService
          items:
            type: object
            properties:
              id:
                type: string
                example: H1
              name:
                type: string
                example: Manhattan Plaza Hotel
              price:
                type: number
                format: float
                example: 250
              currency:
                type: string
                example: USD
              unit:
                type: string
                description: Preiseinheit (z.B. night)
                example: night
        cars:
          type: array
          description: Verfügbare Mietwagen vom CarService
          items:
            type: object
            properties:
              id:
                type: string
                example: C1
              model:
                type: string
                example: Ford Mustang
              price:
                type: number
                format: float
                example: 95
              currency:
                type: string
                example: USD
              unit:
                type: string
                description: Preiseinheit (z.B. day)
                example: day

    BookingRequest:
      type: object
      required:
        - customerName
      properties:
        customerName:
          type: string
          description: Name des Kunden
          example: Max Mustermann
        customerEmail:
          type: string
          format: email
          description: E-Mail-Adresse des Kunden (optional)
          example: max@example.com
        flightId:
          type: string
          description: ID des zu buchenden Fluges (optional)
          example: LH123
        hotelId:
          type: string
          description: ID des zu buchenden Hotels (optional)
          example: H1
        carId:
          type: string
          description: ID des zu buchenden Mietwagens (optional)
          example: C1
        checkIn:
          type: string
          format: date
          description: Check-in Datum für Hotel/Mietwagen
          example: "2024-06-01"
        checkOut:
          type: string
          format: date
          description: Check-out Datum für Hotel/Mietwagen
          example: "2024-06-05"

    Booking:
      type: object
      properties:
        id:
          type: string
          description: Eindeutige Buchungs-ID
          example: BK-20240601-001
        customerName:
          type: string
          example: Max Mustermann
        customerEmail:
          type: string
          example: max@example.com
        status:
          $ref: '#/components/schemas/BookingStatus'
        error:
          type: string
          description: Fehlergrund bei Status FAILED
          example: "Hotel H1 not available for requested dates"
        createdAt:
          type: string
          format: date-time
          example: "2024-05-15T10:30:00Z"
        flight:
          $ref: '#/components/schemas/FlightBooking'
        hotel:
          $ref: '#/components/schemas/HotelBooking'
        car:
          $ref: '#/components/schemas/CarBooking'
        totalEstimate:
          $ref: '#/components/schemas/TotalEstimate'

    BookingSummary:
      type: object
      description: Kurzübersicht einer Buchung für Listenansichten
      properties:
        id:
          type: string
          example: BK-20240601-001
        customerName:
          type: string
          example: Max Mustermann
        status:
          $ref: '#/components/schemas/BookingStatus'
        createdAt:
          type: string
          format: date-time
          example: "2024-05-15T10:30:00Z"
        hasFlight:
          type: boolean
          example: true
        hasHotel:
          type: boolean
          example: true
        hasCar:
          type: boolean
          example: true

    BookingStatus:
      type: string
      enum:
        - PENDING
        - CONFIRMED
        - FAILED
        - CANCELLED
      description: |
        Status der Gesamtbuchung:
        - `PENDING`: Buchung wird verarbeitet
        - `CONFIRMED`: Alle Teilbuchungen erfolgreich bestätigt
        - `FAILED`: Mindestens eine Teilbuchung fehlgeschlagen, SAGA-Rollback durchgeführt
        - `CANCELLED`: Buchung vom Kunden storniert
      example: CONFIRMED

    SubBookingStatus:
      type: string
      enum:
        - CONFIRMED
        - FAILED
        - ROLLED_BACK
        - NOT_ATTEMPTED
        - CANCELLED
      description: |
        Status einer Teilbuchung (Flight, Hotel, Car):
        - `CONFIRMED`: Erfolgreich gebucht
        - `FAILED`: Buchung fehlgeschlagen
        - `ROLLED_BACK`: War gebucht, wurde durch SAGA-Rollback storniert
        - `NOT_ATTEMPTED`: Wurde nicht versucht (wegen vorherigem Fehler)
        - `CANCELLED`: Vom Kunden storniert
      example: CONFIRMED

    FlightBooking:
      type: object
      description: Details der Flugbuchung
      properties:
        bookingRef:
          type: string
          description: Buchungsreferenz beim Flight Service
          example: FB-001
        flightId:
          type: string
          example: LH123
        origin:
          type: string
          example: Frankfurt
        destination:
          type: string
          example: New York
        price:
          type: number
          format: float
          example: 450
        currency:
          type: string
          example: EUR
        status:
          $ref: '#/components/schemas/SubBookingStatus'
        error:
          type: string
          description: Fehlergrund bei Status FAILED
          example: Flight not available
        note:
          type: string
          description: Zusätzliche Information (z.B. bei ROLLED_BACK oder NOT_ATTEMPTED)
          example: Booking was created and then cancelled due to saga rollback

    HotelBooking:
      type: object
      description: Details der Hotelbuchung
      properties:
        bookingRef:
          type: string
          description: Buchungsreferenz beim Hotel Service
          example: HB-001
        hotelId:
          type: string
          example: H1
        name:
          type: string
          example: Manhattan Plaza Hotel
        checkIn:
          type: string
          format: date
          example: "2024-06-01"
        checkOut:
          type: string
          format: date
          example: "2024-06-05"
        nights:
          type: integer
          example: 4
        pricePerNight:
          type: number
          format: float
          example: 250
        totalPrice:
          type: number
          format: float
          example: 1000
        currency:
          type: string
          example: USD
        status:
          $ref: '#/components/schemas/SubBookingStatus'
        error:
          type: string
          description: Fehlergrund bei Status FAILED
        note:
          type: string
          description: Zusätzliche Information (z.B. bei ROLLED_BACK oder NOT_ATTEMPTED)

    CarBooking:
      type: object
      description: Details der Mietwagenbuchung
      properties:
        bookingRef:
          type: string
          description: Buchungsreferenz beim Car Service
          example: CB-001
        carId:
          type: string
          example: C1
        model:
          type: string
          example: Ford Mustang
        pickUp:
          type: string
          format: date
          example: "2024-06-01"
        dropOff:
          type: string
          format: date
          example: "2024-06-05"
        days:
          type: integer
          example: 4
        pricePerDay:
          type: number
          format: float
          example: 95
        totalPrice:
          type: number
          format: float
          example: 380
        currency:
          type: string
          example: USD
        status:
          $ref: '#/components/schemas/SubBookingStatus'
        error:
          type: string
          description: Fehlergrund bei Status FAILED
        note:
          type: string
          description: Zusätzliche Information (z.B. bei ROLLED_BACK oder NOT_ATTEMPTED)

    TotalEstimate:
      type: object
      description: Gesamtpreisschätzung (ohne Währungsumrechnung)
      properties:
        note:
          type: string
          example: Prices in original currencies - conversion not included
        items:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [flight, hotel, car]
              amount:
                type: number
                format: float
              currency:
                type: string

    ValidationError:
      type: object
      properties:
        error:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Invalid booking request
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: flightId
              message:
                type: string
                example: Flight LH999 not found

    Error:
      type: object
      properties:
        error:
          type: string
          example: NOT_FOUND
        message:
          type: string
          example: Booking not found
