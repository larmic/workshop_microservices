services:
  flight:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: flight
    image: larmic/workshop-microservices-flight:latest
    ports:
      - "8081:8080"

  hotel:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: hotel
    image: larmic/workshop-microservices-hotel:latest
    ports:
      - "8082:8080"

  car:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: car
    image: larmic/workshop-microservices-car:latest
    ports:
      - "8083:8080"
