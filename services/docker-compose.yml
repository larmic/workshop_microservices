services:
  consul:
    image: hashicorp/consul:1.22
    command: agent -dev -ui -client=0.0.0.0 -config-dir=/consul/config
    ports:
      - "8500:8500"
    volumes:
      - ./consul-config:/consul/config
    depends_on:
      - flight
      - hotel
      - car
      - booking-story1

  flight:
    build:
      context: .
      dockerfile: flight/Dockerfile
    image: larmic/workshop-microservices-flight:latest
    ports:
      - "8081:8080"

  hotel:
    build:
      context: .
      dockerfile: hotel/Dockerfile
    image: larmic/workshop-microservices-hotel:latest
    ports:
      - "8082:8080"

  car:
    build:
      context: .
      dockerfile: car/Dockerfile
    image: larmic/workshop-microservices-car:latest
    ports:
      - "8083:8080"

  booking-story1:
    build:
      context: .
      dockerfile: booking/story1/Dockerfile
    image: larmic/workshop-microservices-booking-story1:latest
    ports:
      - "8085:8080"
    environment:
      FLIGHT_SERVICE_URL: http://flight:8080
      HOTEL_SERVICE_URL: http://hotel:8080
      CAR_SERVICE_URL: http://car:8080
    depends_on:
      - flight
      - hotel
      - car

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    ports:
      - "8084:8080"
    environment:
      URLS: >-
        [
          { "url": "http://localhost:8081/openapi", "name": "Flight Service" },
          { "url": "http://localhost:8082/openapi", "name": "Hotel Service" },
          { "url": "http://localhost:8083/openapi", "name": "Car Service" },
          { "url": "http://localhost:8085/openapi", "name": "Booking Service (Story 1)" }
        ]
    depends_on:
      - flight
      - hotel
      - car
      - booking-story1
