services:
  flight:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: flight
    image: larmic/workshop-microservices-flight:latest
    deploy:
      replicas: 1
    environment:
      CONSUL_URL: http://consul:8500
      SERVICE_NAME: flight-service
      SERVICE_ADDRESS: flight
    depends_on:
      - consul

  hotel:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: hotel
    image: larmic/workshop-microservices-hotel:latest
    deploy:
      replicas: 1
    environment:
      CONSUL_URL: http://consul:8500
      SERVICE_NAME: hotel-service
      SERVICE_ADDRESS: hotel
    depends_on:
      - consul

  car:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: car
    image: larmic/workshop-microservices-car:latest
    deploy:
      replicas: 1
    environment:
      CONSUL_URL: http://consul:8500
      SERVICE_NAME: car-service
      SERVICE_ADDRESS: car
    depends_on:
      - consul
