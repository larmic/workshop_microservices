services:
  flight:
    build:
      context: .
      dockerfile: flight/Dockerfile
    image: larmic/workshop-microservices-flight:latest
    ports:
      - "8081:8080"

  hotel:
    build:
      context: .
      dockerfile: hotel/Dockerfile
    image: larmic/workshop-microservices-hotel:latest
    ports:
      - "8082:8080"

  car:
    build:
      context: .
      dockerfile: car/Dockerfile
    image: larmic/workshop-microservices-car:latest
    ports:
      - "8083:8080"

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    ports:
      - "8084:8080"
    environment:
      URLS: >-
        [
          { "url": "http://localhost:8081/openapi", "name": "Flight Service" },
          { "url": "http://localhost:8082/openapi", "name": "Hotel Service" },
          { "url": "http://localhost:8083/openapi", "name": "Car Service" }
        ]
    depends_on:
      - flight
      - hotel
      - car
