openapi: 3.0.3
info:
  title: HotelService API
  description: Service zur Verwaltung von Hotelbuchungen
  version: 1.0.0

servers:
  - url: http://localhost/api/hotel
    description: API-Gateway (Traefik)

paths:
  /health:
    get:
      summary: Health-Check
      description: Gibt den Gesundheitsstatus des Services zurück
      operationId: getHealth
      responses:
        '200':
          description: Service ist gesund
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /info:
    get:
      summary: Service-Konfiguration
      description: Gibt die aktuelle Service-Konfiguration zurück
      operationId: getInfo
      responses:
        '200':
          description: Aktuelle Konfiguration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'

  /openapi:
    get:
      summary: OpenAPI specification
      description: Returns the OpenAPI specification of this service
      operationId: getOpenApi
      responses:
        '200':
          description: OpenAPI specification
          content:
            text/yaml:
              schema:
                type: string

  /hotels:
    get:
      summary: Liste verfügbarer Hotels
      description: Gibt eine Liste aller verfügbaren Hotels zurück
      operationId: getHotels
      responses:
        '200':
          description: Liste der Hotels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Hotel'

  /hotels/{id}:
    get:
      summary: Hoteldetails
      description: Gibt die Details eines bestimmten Hotels zurück
      operationId: getHotelById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Hoteldetails
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Hotel'
        '404':
          description: Hotel nicht gefunden

  /bookings:
    post:
      summary: Hotel buchen
      description: |
        Bestätigt eine Hotelbuchung und loggt sie auf stdout. Es findet keine
        Persistenz statt — die Buchung existiert nur in den Logs.
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
      responses:
        '201':
          description: Buchung erfolgreich bestätigt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: Ungültige Anfrage

  /bookings/{id}:
    delete:
      summary: Hotelbuchung stornieren
      description: |
        Storniert (kompensiert) eine zuvor erstellte Hotelbuchung. Es findet
        keine Persistenz statt — die Stornierung wird ausschließlich geloggt.
        Der Endpoint ist idempotent: auch unbekannte oder bereits stornierte
        IDs liefern 204 No Content. Damit eignet er sich als Kompensations-
        Schritt in einer Saga (siehe Story 5).
      operationId: cancelBooking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: H-3b5d22
      responses:
        '204':
          description: Buchung storniert (oder war nie vorhanden) — Endpoint ist idempotent

  /events/compensation:
    post:
      summary: Kompensations-Event entgegennehmen (Story 6)
      description: |
        Nimmt ein `CompensationRequested`-Event vom Booking-Service entgegen
        und antwortet **sofort mit 202 Accepted**. Die eigentliche Stornierung
        läuft asynchron in einer Goroutine — der Sender wartet nicht auf das
        Ergebnis (fire & forget). Genutzt in der Choreography-Saga von Story 6,
        im Gegensatz zum synchronen `DELETE /bookings/{id}` aus Story 5.
      operationId: receiveCompensationEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompensationEvent'
      responses:
        '202':
          description: Event entgegengenommen, Verarbeitung läuft asynchron
        '400':
          description: Ungültiges Event (fehlende Pflichtfelder)

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP

    InfoResponse:
      type: object
      properties:
        serviceName:
          type: string
          example: hotel-service
        serviceAddress:
          type: string
          example: hotel-service

    Hotel:
      type: object
      properties:
        id:
          type: string
          example: H1
        name:
          type: string
          example: Grand Hotel Berlin
        price:
          type: number
          format: float
          example: 150
        currency:
          type: string
          example: EUR
        unit:
          type: string
          example: night

    BookingRequest:
      type: object
      required:
        - hotelId
        - customerName
      properties:
        hotelId:
          type: string
          example: H1
        customerName:
          type: string
          example: Max Mustermann

    Booking:
      type: object
      properties:
        bookingId:
          type: string
          example: H-3b5d22
        hotelId:
          type: string
          example: H1
        customerName:
          type: string
          example: Max Mustermann
        status:
          type: string
          enum: [CONFIRMED]
          example: CONFIRMED

    CompensationEvent:
      type: object
      required:
        - eventId
        - sagaId
        - bookingId
      properties:
        eventId:
          type: string
          description: Eindeutige Event-ID, vom Sender erzeugt. Nutzbar als Dedup-Key für Idempotenz.
          example: ev-3f9a1c
        sagaId:
          type: string
          description: Saga-ID des Booking-Service, mit der das Event korreliert wird.
          example: S-7c1a9f
        bookingId:
          type: string
          description: ID der zu stornierenden Buchung in diesem Service.
          example: H-3b5d22
