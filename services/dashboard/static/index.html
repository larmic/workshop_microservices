<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }
        header {
            background: #1a1a2e;
            color: #fff;
            padding: 1.5rem 2rem;
            text-align: center;
        }
        header h1 { font-size: 1.5rem; font-weight: 600; }
        header p { font-size: 0.875rem; color: #aaa; margin-top: 0.25rem; }
        .error-banner {
            background: #fee;
            color: #c00;
            padding: 0.75rem 1rem;
            text-align: center;
            display: none;
            border-bottom: 2px solid #fcc;
        }
        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .links-section {
            max-width: 1100px;
            margin: 2rem auto 0;
            padding: 0 1rem;
        }
        .links-section h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 0.75rem;
        }
        .links-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .link-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            text-decoration: none;
            color: #2d6cdf;
            font-size: 0.875rem;
            font-weight: 500;
            transition: box-shadow 0.15s, background 0.15s;
        }
        .link-chip:hover {
            background: #2d6cdf;
            color: #fff;
            box-shadow: 0 2px 8px rgba(45,108,223,0.3);
        }
        .link-chip span { font-size: 1rem; }

        /* Circuit Breaker Section */
        .cb-section {
            background: #fff;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }
        .cb-section h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 1rem;
        }
        .cb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
        }
        .cb-card {
            background: #f9f9fb;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 1rem;
        }
        .cb-card-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1a1a2e;
            text-transform: capitalize;
            margin-bottom: 0.5rem;
        }
        .cb-badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            background: #ddd;
            color: #555;
            margin-bottom: 0.75rem;
        }
        .cb-badge.closed   { background: #d4f4dd; color: #1d7a3a; }
        .cb-badge.open     { background: #fde0e0; color: #b3261e; }
        .cb-badge.halfopen { background: #fff3cd; color: #8a6d00; }
        .cb-card-details {
            font-size: 0.8rem;
            color: #555;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .cb-card-details strong { color: #1a1a2e; font-variant-numeric: tabular-nums; }
        .cb-countdown {
            font-variant-numeric: tabular-nums;
            font-weight: 700;
            color: #b3261e;
        }
        .cb-empty {
            grid-column: 1 / -1;
            text-align: center;
            color: #888;
            font-size: 0.875rem;
            padding: 1rem;
        }

        /* Services grid */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: box-shadow 0.2s;
        }
        .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        .card.loading { opacity: 0.6; pointer-events: none; }
        .card-header { text-align: center; margin-bottom: 1rem; }
        .card-icon { font-size: 2.5rem; margin-bottom: 0.25rem; }
        .card-name {
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: capitalize;
            color: #1a1a2e;
        }
        .replica-count {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2d6cdf;
            line-height: 1;
            text-align: center;
            margin-bottom: 0.75rem;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .btn {
            width: 40px;
            height: 40px;
            border: 2px solid #ddd;
            border-radius: 50%;
            background: #fff;
            font-size: 1.25rem;
            font-weight: 700;
            color: #333;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:hover:not(:disabled) {
            background: #2d6cdf;
            color: #fff;
            border-color: #2d6cdf;
        }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Chaos controls */
        .chaos-section {
            border-top: 1px solid #eee;
            padding-top: 1rem;
            margin-top: 0.5rem;
        }
        .chaos-section h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            font-weight: 600;
            margin-bottom: 0.6rem;
        }
        .chaos-btns {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 0.75rem;
        }
        .chaos-btn {
            flex: 1;
            padding: 0.5rem 0.5rem;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            background: #fff;
            font-size: 0.8rem;
            font-weight: 600;
            color: #555;
            cursor: pointer;
            transition: all 0.15s;
        }
        .chaos-btn:hover { border-color: #888; }
        .chaos-btn.active.normal   { background: #1d7a3a; color: #fff; border-color: #1d7a3a; }
        .chaos-btn.active.slow     { background: #b8860b; color: #fff; border-color: #b8860b; }
        .chaos-btn.active.fail     { background: #b3261e; color: #fff; border-color: #b3261e; }
        .chaos-btn.mixed { background: #ddd; color: #444; border-color: #aaa; }
        .latency-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 0.75rem;
        }
        .latency-row label { white-space: nowrap; }
        .latency-row input {
            width: 70px;
            padding: 0.25rem 0.4rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.75rem;
            font-variant-numeric: tabular-nums;
        }
        .latency-hint {
            color: #999;
            font-size: 0.7rem;
        }

        .instances-block {
            margin-top: 0.5rem;
            font-size: 0.8rem;
        }
        .instances-heading {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }
        .instance-list { list-style: none; }
        .instance-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
            gap: 0.5rem;
            border-top: 1px dashed #eee;
        }
        .instance-id {
            font-family: ui-monospace, "SF Mono", Monaco, monospace;
            font-size: 0.75rem;
            color: #555;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .instance-mode {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
        }
        .instance-mode.normal { background: #d4f4dd; color: #1d7a3a; }
        .instance-mode.slow   { background: #fff3cd; color: #8a6d00; }
        .instance-mode.fail   { background: #fde0e0; color: #b3261e; }
        .instance-mode.unknown { background: #eee; color: #888; }
        .instance-actions {
            display: flex;
            gap: 0.25rem;
        }
        .mini-btn {
            padding: 0.2rem 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .mini-btn:hover { background: #f0f0f0; }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #ddd;
            border-top-color: #2d6cdf;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0.5rem auto 0;
        }
        .card.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <h1>Workshop Dashboard</h1>
        <p>Microservices verwalten</p>
    </header>
    <div class="error-banner" id="error"></div>

    <div class="links-section">
        <h2>Tools</h2>
        <div class="links-grid">
            <a class="link-chip" href="/api" target="_blank"><span>&#128196;</span> Swagger API</a>
            <a class="link-chip" href="/consul" target="_blank"><span>&#128270;</span> Consul</a>
            <a class="link-chip" href="http://localhost:8080" target="_blank"><span>&#9881;</span> Traefik</a>
        </div>
        <h2>Service APIs</h2>
        <div class="links-grid">
            <a class="link-chip" href="/api/flight/openapi" target="_blank"><span>&#9992;</span> Flight</a>
            <a class="link-chip" href="/api/hotel/openapi" target="_blank"><span>&#127976;</span> Hotel</a>
            <a class="link-chip" href="/api/car/openapi" target="_blank"><span>&#128663;</span> Car</a>
            <a class="link-chip" href="/api/booking-story1/openapi" target="_blank"><span>&#128214;</span> Booking Story 1</a>
            <a class="link-chip" href="/api/booking-story2/openapi" target="_blank"><span>&#128214;</span> Booking Story 2</a>
            <a class="link-chip" href="/api/booking-story3/openapi" target="_blank"><span>&#128214;</span> Booking Story 3</a>
        </div>
    </div>

    <div class="container">
        <div class="cb-section">
            <h2>Circuit Breaker (Booking Story 3)</h2>
            <div class="cb-grid" id="cb-grid"></div>
        </div>

        <div class="services-grid" id="services"></div>
    </div>

    <script>
        const icons = { flight: "&#9992;", hotel: "&#127976;", car: "&#128663;" };
        let services = [];
        let instancesByService = {};
        const latencyByService = { flight: 2000, hotel: 2000, car: 2000 };

        function onLatencyChange(name, value) {
            const v = parseInt(value, 10);
            if (isFinite(v) && v > 0) latencyByService[name] = v;
        }

        async function fetchServices() {
            try {
                const res = await fetch("/dashboard/api/services");
                if (!res.ok) throw new Error(await res.text());
                services = await res.json();
                await Promise.all(services.map(s => fetchInstances(s.name)));
                render();
                hideError();
            } catch (e) {
                showError("Fehler beim Laden: " + e.message);
            }
        }

        async function fetchInstances(name) {
            try {
                const res = await fetch("/dashboard/api/services/" + name + "/instances");
                if (!res.ok) throw new Error(await res.text());
                instancesByService[name] = await res.json();
            } catch (e) {
                instancesByService[name] = [];
            }
        }

        async function fetchCircuitState() {
            try {
                const res = await fetch("/dashboard/api/circuit-state");
                if (!res.ok) throw new Error(await res.text());
                const cbs = await res.json();
                renderCircuit(cbs);
            } catch (e) {
                renderCircuit(null);
            }
        }

        async function scale(name, replicas) {
            const card = document.getElementById("card-" + name);
            card.classList.add("loading");
            try {
                const res = await fetch("/dashboard/api/services/" + name + "/scale", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ replicas })
                });
                if (!res.ok) throw new Error(await res.text());
                const updated = await res.json();
                const idx = services.findIndex(s => s.name === name);
                if (idx >= 0) services[idx] = updated;
                await fetchInstances(name);
                render();
                hideError();
            } catch (e) {
                showError("Scaling fehlgeschlagen: " + e.message);
            } finally {
                card.classList.remove("loading");
            }
        }

        function readLatency(name) {
            return latencyByService[name] || 2000;
        }

        async function setChaos(name, mode, instanceId) {
            const card = document.getElementById("card-" + name);
            card.classList.add("loading");
            try {
                const body = { mode, latencyMs: mode === "slow" ? readLatency(name) : 0 };
                if (instanceId) body.instanceIds = [instanceId];
                const res = await fetch("/dashboard/api/services/" + name + "/chaos", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
                if (!res.ok) throw new Error(await res.text());
                await fetchInstances(name);
                render();
                hideError();
            } catch (e) {
                showError("Chaos fehlgeschlagen: " + e.message);
            } finally {
                card.classList.remove("loading");
            }
        }

        function aggregateMode(instances) {
            const modes = new Set();
            for (const inst of instances) {
                if (inst.chaos && inst.chaos.mode) modes.add(inst.chaos.mode);
                else modes.add("unknown");
            }
            if (modes.size === 1) return [...modes][0];
            return "mixed";
        }

        function chaosBtn(name, mode, label, current, instanceId) {
            const isActive = current === mode;
            const cls = "chaos-btn " + mode + (isActive ? " active" : "");
            const inst = instanceId ? `, '${instanceId}'` : "";
            return `<button class="${cls}" onclick="setChaos('${name}', '${mode}'${inst})">${label}</button>`;
        }

        function renderInstance(name, inst) {
            const mode = (inst.chaos && inst.chaos.mode) ? inst.chaos.mode : "unknown";
            const reachable = inst.reachable ? "" : " (offline)";
            const latencySuffix = (mode === "slow" && inst.chaos && inst.chaos.latencyMs)
                ? ` ${inst.chaos.latencyMs}ms` : "";
            return `
                <li class="instance-row">
                    <span class="instance-id" title="${inst.id}">${inst.id}${reachable}</span>
                    <span class="instance-mode ${mode}">${mode}${latencySuffix}</span>
                    <span class="instance-actions">
                        <button class="mini-btn" onclick="setChaos('${name}', 'normal', '${inst.id}')">N</button>
                        <button class="mini-btn" onclick="setChaos('${name}', 'slow', '${inst.id}')">L</button>
                        <button class="mini-btn" onclick="setChaos('${name}', 'fail', '${inst.id}')">F</button>
                    </span>
                </li>
            `;
        }

        function render() {
            const container = document.getElementById("services");
            container.innerHTML = services.map(s => {
                const instances = instancesByService[s.name] || [];
                const aggMode = aggregateMode(instances);
                const instanceList = instances.length > 0
                    ? `<div class="instances-block">
                         <div class="instances-heading">Instanzen (${instances.length})</div>
                         <ul class="instance-list">
                           ${instances.map(i => renderInstance(s.name, i)).join("")}
                         </ul>
                       </div>`
                    : "";

                return `
                <div class="card" id="card-${s.name}">
                    <div class="card-header">
                        <div class="card-icon">${icons[s.name] || "&#9881;"}</div>
                        <div class="card-name">${s.name}</div>
                    </div>
                    <div class="replica-count">${s.replicas}</div>
                    <div class="controls">
                        <button class="btn" onclick="scale('${s.name}', ${s.replicas - 1})"
                            ${s.replicas <= 0 ? "disabled" : ""}>&#8722;</button>
                        <button class="btn" onclick="scale('${s.name}', ${s.replicas + 1})"
                            ${s.replicas >= 10 ? "disabled" : ""}>&#43;</button>
                    </div>
                    <div class="chaos-section">
                        <h3>Chaos-Modus${aggMode === "mixed" ? " (gemischt)" : ""}</h3>
                        <div class="latency-row">
                            <label for="latency-${s.name}">Latenz für "Langsam":</label>
                            <input type="number" id="latency-${s.name}" min="100" max="10000" step="100"
                                value="${latencyByService[s.name]}"
                                oninput="onLatencyChange('${s.name}', this.value)" />
                            <span class="latency-hint">ms (>3000 → Timeout)</span>
                        </div>
                        <div class="chaos-btns">
                            ${chaosBtn(s.name, "normal", "Normal", aggMode)}
                            ${chaosBtn(s.name, "slow", "Langsam", aggMode)}
                            ${chaosBtn(s.name, "fail", "Fehler", aggMode)}
                        </div>
                        ${instanceList}
                    </div>
                    <div class="spinner"></div>
                </div>
                `;
            }).join("");
        }

        function renderCircuit(cbs) {
            const grid = document.getElementById("cb-grid");
            if (!cbs || !Array.isArray(cbs) || cbs.length === 0) {
                grid.innerHTML = '<div class="cb-empty">Booking Story 3 nicht erreichbar</div>';
                return;
            }
            grid.innerHTML = cbs.map(cb => {
                const stateClass = cb.state === "CLOSED" ? "closed"
                    : cb.state === "OPEN" ? "open"
                    : "halfopen";
                let countdown = "";
                if (cb.state === "OPEN" && cb.openUntil) {
                    const remaining = Math.max(0, Math.ceil((new Date(cb.openUntil) - new Date()) / 1000));
                    countdown = `<div class="cb-countdown">HALF_OPEN in ${remaining}s</div>`;
                }
                return `
                    <div class="cb-card">
                        <div class="cb-card-name">${cb.name}</div>
                        <div class="cb-badge ${stateClass}">${cb.state}</div>
                        <div class="cb-card-details">
                            <span>failures: <strong>${cb.failureCount}/${cb.failureThreshold}</strong></span>
                            <span>calls: <strong>${cb.totalCalls}</strong></span>
                            <span>fallbacks: <strong>${cb.totalShortCircuits}</strong></span>
                            <span>errors: <strong>${cb.totalFailures}</strong></span>
                            ${countdown}
                        </div>
                    </div>
                `;
            }).join("");
        }

        function showError(msg) {
            const el = document.getElementById("error");
            el.textContent = msg;
            el.style.display = "block";
        }

        function hideError() {
            document.getElementById("error").style.display = "none";
        }

        fetchServices();
        fetchCircuitState();
        setInterval(fetchServices, 5000);
        setInterval(fetchCircuitState, 1000);
    </script>
</body>
</html>
