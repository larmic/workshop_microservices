openapi: 3.0.3
info:
  title: CarService API
  description: Service zur Verwaltung von Mietwagenbuchungen
  version: 1.0.0

servers:
  - url: http://localhost/api/car
    description: API-Gateway (Traefik)

paths:
  /health:
    get:
      summary: Health-Check
      description: Gibt den Gesundheitsstatus des Services zurück
      operationId: getHealth
      responses:
        '200':
          description: Service ist gesund
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /info:
    get:
      summary: Service-Konfiguration
      description: Gibt die aktuelle Service-Konfiguration zurück
      operationId: getInfo
      responses:
        '200':
          description: Aktuelle Konfiguration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'

  /openapi:
    get:
      summary: OpenAPI specification
      description: Returns the OpenAPI specification of this service
      operationId: getOpenApi
      responses:
        '200':
          description: OpenAPI specification
          content:
            text/yaml:
              schema:
                type: string

  /cars:
    get:
      summary: Liste verfügbarer Mietwagen
      description: Gibt eine Liste aller verfügbaren Mietwagen zurück
      operationId: getCars
      responses:
        '200':
          description: Liste der Mietwagen
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Car'

  /cars/{id}:
    get:
      summary: Mietwagendetails
      description: Gibt die Details eines bestimmten Mietwagens zurück
      operationId: getCarById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Mietwagendetails
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'
        '404':
          description: Mietwagen nicht gefunden

  /bookings:
    post:
      summary: Mietwagen buchen
      description: |
        Bestätigt eine Mietwagenbuchung und loggt sie auf stdout. Es findet
        keine Persistenz statt — die Buchung existiert nur in den Logs.
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
      responses:
        '201':
          description: Buchung erfolgreich bestätigt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: Ungültige Anfrage

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP

    InfoResponse:
      type: object
      properties:
        serviceName:
          type: string
          example: car-service
        serviceAddress:
          type: string
          example: car-service

    Car:
      type: object
      properties:
        id:
          type: string
          example: C1
        model:
          type: string
          example: VW Golf
        price:
          type: number
          format: float
          example: 45
        currency:
          type: string
          example: EUR
        unit:
          type: string
          example: day

    BookingRequest:
      type: object
      required:
        - carId
        - customerName
      properties:
        carId:
          type: string
          example: C1
        customerName:
          type: string
          example: Max Mustermann

    Booking:
      type: object
      properties:
        bookingId:
          type: string
          example: C-9f4e80
        carId:
          type: string
          example: C1
        customerName:
          type: string
          example: Max Mustermann
        status:
          type: string
          enum: [CONFIRMED]
          example: CONFIRMED
