<!-- Welle am unteren Slide-Rand mit team neusta Logo -->
<div class="slide-wave" aria-hidden="true">
    <svg viewBox="0 0 1440 110" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path id="wave-path" class="wave-path" fill="rgb(238,231,251)" d=""/>
    </svg>
    <img class="wave-logo" src="/dashboard/team-neusta-logo.svg" alt="team neusta"/>

<script src="https://cdn.jsdelivr.net/npm/reveal.js@6.0.1/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@6.0.1/dist/plugin/markdown.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@6.0.1/dist/plugin/highlight.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@6.0.1/dist/plugin/notes.js"></script>
<script>
    Reveal.initialize({
        hash: true,
        slideNumber: 'c/t',
        transition: 'slide',
        controls: true,
        progress: true,
        center: true,
        plugins: [RevealMarkdown, RevealHighlight, RevealNotes]
    });

    // Welle: voll-breit. Der Peak (höchster Punkt) wandert von links nach
    // rechts entlang des Slide-Fortschritts. Path wird neu berechnet.
    // Wellenform: zwei überlagerte, überall glatte Funktionen.
    //   basis(x) = Cosinus mit voller Wellenlänge = VIEW_W → permanente
    //              kleine Erhöhungen an beiden Rändern, Senke in der Mitte.
    //   main(x)  = Gauss-Glocke um peakX → wandernder Hauptpeak.
    // Beide sind C^∞-stetig, daher entsteht nirgends ein Knick. Auf Slide 1
    // fällt main mit der linken Basis-Erhöhung zusammen (großer Peak links),
    // die rechte Basis-Erhöhung bleibt als „leicht hoch" erhalten.
    const WAVE_VIEW_W = 1440;
    const WAVE_VIEW_H = 110;
    const WAVE_BASE_Y = 85;        // Y-Basislinie (kein Peak)
    const WAVE_SMALL_AMP = 18;     // permanente Rand-Erhöhungen (Basis-Welle)
    const WAVE_LARGE_AMP = 42;     // wandernder Hauptpeak (Glocke)
    const WAVE_GAUSS_K = 2.5;      // Glockenbreite: kleinere Werte = breiter
    const WAVE_SAMPLES = 200;

    function buildWavePath(ratio) {
        const peakX = ratio * WAVE_VIEW_W;
        let d = '';
        for (let i = 0; i <= WAVE_SAMPLES; i++) {
            const x = (i / WAVE_SAMPLES) * WAVE_VIEW_W;
            const basis = WAVE_SMALL_AMP * (1 + Math.cos(2 * Math.PI * x / WAVE_VIEW_W)) / 2;
            const t = (x - peakX) * WAVE_GAUSS_K / WAVE_VIEW_W;
            const main = WAVE_LARGE_AMP * Math.exp(-t * t);
            const y = WAVE_BASE_Y - basis - main;
            d += (i === 0 ? 'M ' : ' L ') + x.toFixed(2) + ' ' + y.toFixed(2);
        }
        d += ' L ' + WAVE_VIEW_W + ' ' + WAVE_VIEW_H;
        d += ' L 0 ' + WAVE_VIEW_H + ' Z';
        return d;
    }

    function updateWave() {
        const total = Reveal.getTotalSlides();
        const passed = Reveal.getSlidePastCount();
        const ratio = total > 1 ? passed / (total - 1) : 0;
        document.getElementById('wave-path').setAttribute('d', buildWavePath(ratio));
    }
    Reveal.on('ready', updateWave);
    Reveal.on('slidechanged', updateWave);
</script>
