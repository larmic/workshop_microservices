<!-- Welle am unteren Slide-Rand mit team neusta Logo -->
<div class="slide-wave" aria-hidden="true">
    <svg viewBox="0 0 1440 110" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path id="wave-path" class="wave-path" fill="rgb(238,231,251)" d=""/>
    </svg>
    <img class="wave-logo" src="/dashboard/team-neusta-logo.svg" alt="team neusta"/>
</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
<script>
    Reveal.initialize({
        hash: true,
        slideNumber: 'c/t',
        transition: 'slide',
        controls: true,
        progress: false,
        plugins: [RevealMarkdown, RevealHighlight, RevealNotes]
    });

    // Welle: voll-breit. Der Peak (höchster Punkt) wandert von links nach
    // rechts entlang des Slide-Fortschritts. Path wird neu berechnet.
    // Wellenform: Cosinus über volle viewBox (Halbwellenlänge = Bildschirm).
    // Ein Peak und ein Tal pro Slide — der Peak wandert mit dem Fortschritt
    // von links nach rechts, das Tal entsprechend gegenläufig.
    // Tal-Werte unter VIEW_H werden auf VIEW_H geclampt: die Welle "taucht
    // ins Wasser ein" statt eine harte horizontale Basislinie zu zeigen.
    const WAVE_VIEW_W = 1440;
    const WAVE_VIEW_H = 110;
    const WAVE_BASE_Y = 75;       // Mittellinie der Welle
    const WAVE_AMP = 38;          // Amplitude (Peak liegt BASE-AMP, Tal BASE+AMP)
    const WAVE_SAMPLES = 160;

    function buildWavePath(ratio) {
        const peakX = ratio * WAVE_VIEW_W;
        let d = '';
        for (let i = 0; i <= WAVE_SAMPLES; i++) {
            const x = (i / WAVE_SAMPLES) * WAVE_VIEW_W;
            const cosVal = Math.cos((x - peakX) / WAVE_VIEW_W * Math.PI);
            const y = Math.min(WAVE_VIEW_H, WAVE_BASE_Y - WAVE_AMP * cosVal);
            d += (i === 0 ? 'M ' : ' L ') + x.toFixed(2) + ' ' + y.toFixed(2);
        }
        d += ' L ' + WAVE_VIEW_W + ' ' + WAVE_VIEW_H;
        d += ' L 0 ' + WAVE_VIEW_H + ' Z';
        return d;
    }

    function updateWave() {
        const total = Reveal.getTotalSlides();
        const passed = Reveal.getSlidePastCount();
        const ratio = total > 1 ? passed / (total - 1) : 0;
        document.getElementById('wave-path').setAttribute('d', buildWavePath(ratio));
    }
    Reveal.on('ready', updateWave);
    Reveal.on('slidechanged', updateWave);
</script>
</body>
