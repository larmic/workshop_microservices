services:
  booking-workshop:
    container_name: booking-workshop
    build:
      context: ${WORKSHOP_BOOKING_PATH}
    image: workshop-microservices-booking:workshop
    environment:
      FLIGHT_SERVICE_URL: http://flight:8080
      HOTEL_SERVICE_URL: http://hotel:8080
      CAR_SERVICE_URL: http://car:8080
    #  CONSUL_URL: http://consul:8500
    #depends_on:
    #  consul:
    #    condition: service_healthy

  # Override: signalisiert dem Dashboard, dass der Workshop-Service Teil
  # des aktuellen Setups ist. Ohne diese ENV taucht "booking-workshop" gar
  # nicht erst in der Health-Übersicht auf.
  dashboard:
    environment:
      BOOKING_WORKSHOP_URL: http://booking-workshop:8080
