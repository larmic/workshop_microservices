services:
  booking-workshop:
    container_name: booking-workshop
    build:
      context: ${WORKSHOP_BOOKING_PATH}
    image: workshop-microservices-booking:workshop
    ports:
      - "8099:8080"
    environment:
      FLIGHT_SERVICE_URL: http://flight:8080
      HOTEL_SERVICE_URL: http://hotel:8080
      CAR_SERVICE_URL: http://car:8080

  # Override: signalisiert dem Dashboard, dass der Workshop-Service Teil
  # des aktuellen Setups ist. Ohne diese ENV taucht "booking-workshop" gar
  # nicht erst in der Health-Übersicht auf.
  dashboard:
    environment:
      BOOKING_WORKSHOP_URL: http://booking-workshop:8080

  # Override: erweitert die Swagger-UI-Liste um den Workshop-Service.
  # Identisch zu docker-compose.infra.yml + ein zusätzlicher Eintrag am Ende.
  swagger-ui:
    environment:
      URLS: >-
        [
          { "url": "http://localhost/api/flight/openapi", "name": "Flight Service" },
          { "url": "http://localhost/api/hotel/openapi", "name": "Hotel Service" },
          { "url": "http://localhost/api/car/openapi", "name": "Car Service" },
          { "url": "http://localhost/api/booking-story1/openapi", "name": "Booking Service (Story 1)" },
          { "url": "http://localhost/api/booking-story2/openapi", "name": "Booking Service (Story 2)" },
          { "url": "http://localhost/api/booking-story3/openapi", "name": "Booking Service (Story 3)" },
          { "url": "http://localhost/api/booking-story4/openapi", "name": "Booking Service (Story 4)" },
          { "url": "http://localhost/api/booking-story5/openapi", "name": "Booking Service (Story 5)" },
          { "url": "http://localhost/api/booking-story6/openapi", "name": "Booking Service (Story 6)" },
          { "url": "http://localhost/api/booking-story7/openapi", "name": "Booking Service (Story 7)" },
          { "url": "http://localhost/api/booking-workshop/openapi", "name": "Booking Service (Workshop)" }
        ]
