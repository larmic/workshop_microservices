openapi: 3.0.3
info:
  title: FlightService API
  description: Service zur Verwaltung von Flugbuchungen
  version: 1.0.0

servers:
  - url: http://localhost/api/flight
    description: API-Gateway (Traefik)

paths:
  /health:
    get:
      summary: Health-Check
      description: Gibt den Gesundheitsstatus des Services zurück
      operationId: getHealth
      responses:
        '200':
          description: Service ist gesund
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /info:
    get:
      summary: Service-Konfiguration
      description: Gibt die aktuelle Service-Konfiguration zurück
      operationId: getInfo
      responses:
        '200':
          description: Aktuelle Konfiguration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'

  /openapi:
    get:
      summary: OpenAPI specification
      description: Returns the OpenAPI specification of this service
      operationId: getOpenApi
      responses:
        '200':
          description: OpenAPI specification
          content:
            text/yaml:
              schema:
                type: string

  /flights:
    get:
      summary: Liste verfügbarer Flüge
      description: Gibt eine Liste aller verfügbaren Flüge zurück
      operationId: getFlights
      responses:
        '200':
          description: Liste der Flüge
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Flight'

  /flights/{id}:
    get:
      summary: Flugdetails
      description: Gibt die Details eines bestimmten Fluges zurück
      operationId: getFlightById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Flugdetails
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flight'
        '404':
          description: Flug nicht gefunden

  /bookings:
    post:
      summary: Flug buchen
      description: |
        Bestätigt eine Flugbuchung und loggt sie auf stdout. Es findet keine
        Persistenz statt — die Buchung existiert nur in den Logs.
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
      responses:
        '201':
          description: Buchung erfolgreich bestätigt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: Ungültige Anfrage

  /bookings/{id}:
    delete:
      summary: Flugbuchung stornieren
      description: |
        Storniert (kompensiert) eine zuvor erstellte Flugbuchung. Es findet
        keine Persistenz statt — die Stornierung wird ausschließlich geloggt.
        Der Endpoint ist idempotent: auch unbekannte oder bereits stornierte
        IDs liefern 204 No Content. Damit eignet er sich als Kompensations-
        Schritt in einer Saga (siehe Story 5).
      operationId: cancelBooking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: F-7c1a9f
      responses:
        '204':
          description: Buchung storniert (oder war nie vorhanden) — Endpoint ist idempotent

  /events/compensation:
    post:
      summary: Kompensations-Event entgegennehmen (Story 6)
      description: |
        Nimmt ein `CompensationRequested`-Event vom Booking-Service entgegen
        und antwortet **sofort mit 202 Accepted**. Die eigentliche Stornierung
        läuft asynchron in einer Goroutine — der Sender wartet nicht auf das
        Ergebnis (fire & forget). Genutzt in der Choreography-Saga von Story 6,
        im Gegensatz zum synchronen `DELETE /bookings/{id}` aus Story 5.
      operationId: receiveCompensationEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompensationEvent'
      responses:
        '202':
          description: Event entgegengenommen, Verarbeitung läuft asynchron
        '400':
          description: Ungültiges Event (fehlende Pflichtfelder)

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP

    InfoResponse:
      type: object
      properties:
        serviceName:
          type: string
          example: flight-service
        serviceAddress:
          type: string
          example: flight-service

    Flight:
      type: object
      properties:
        id:
          type: string
          example: LH123
        origin:
          type: string
          example: Frankfurt
        destination:
          type: string
          example: New York
        price:
          type: number
          format: float
          example: 450
        currency:
          type: string
          example: EUR

    BookingRequest:
      type: object
      required:
        - flightId
        - customerName
      properties:
        flightId:
          type: string
          example: LH123
        customerName:
          type: string
          example: Max Mustermann

    Booking:
      type: object
      properties:
        bookingId:
          type: string
          example: F-7c1a9f
        flightId:
          type: string
          example: LH123
        customerName:
          type: string
          example: Max Mustermann
        status:
          type: string
          enum: [CONFIRMED]
          example: CONFIRMED

    CompensationEvent:
      type: object
      required:
        - eventId
        - sagaId
        - bookingId
      properties:
        eventId:
          type: string
          description: Eindeutige Event-ID, vom Sender erzeugt. Nutzbar als Dedup-Key für Idempotenz.
          example: ev-3f9a1c
        sagaId:
          type: string
          description: Saga-ID des Booking-Service, mit der das Event korreliert wird.
          example: S-7c1a9f
        bookingId:
          type: string
          description: ID der zu stornierenden Buchung in diesem Service.
          example: F-7c1a9f
