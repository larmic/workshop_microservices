openapi: 3.0.3
info:
  title: FlightService API
  description: Service zur Verwaltung von Flugbuchungen
  version: 1.0.0

servers:
  - url: http://localhost/api/flight
    description: API-Gateway (Traefik)

paths:
  /health:
    get:
      summary: Health-Check
      description: Gibt den Gesundheitsstatus des Services zurück
      operationId: getHealth
      responses:
        '200':
          description: Service ist gesund
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /info:
    get:
      summary: Service-Konfiguration
      description: Gibt die aktuelle Service-Konfiguration zurück
      operationId: getInfo
      responses:
        '200':
          description: Aktuelle Konfiguration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'

  /openapi:
    get:
      summary: OpenAPI specification
      description: Returns the OpenAPI specification of this service
      operationId: getOpenApi
      responses:
        '200':
          description: OpenAPI specification
          content:
            text/yaml:
              schema:
                type: string

  /flights:
    get:
      summary: Liste verfügbarer Flüge
      description: Gibt eine Liste aller verfügbaren Flüge zurück
      operationId: getFlights
      responses:
        '200':
          description: Liste der Flüge
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Flight'

  /flights/{id}:
    get:
      summary: Flugdetails
      description: Gibt die Details eines bestimmten Fluges zurück
      operationId: getFlightById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Flugdetails
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flight'
        '404':
          description: Flug nicht gefunden

  /bookings:
    post:
      summary: Flug buchen
      description: |
        Bestätigt eine Flugbuchung und loggt sie auf stdout. Es findet keine
        Persistenz statt — die Buchung existiert nur in den Logs.
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
      responses:
        '201':
          description: Buchung erfolgreich bestätigt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: Ungültige Anfrage

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP

    InfoResponse:
      type: object
      properties:
        serviceName:
          type: string
          example: flight-service
        serviceAddress:
          type: string
          example: flight-service

    Flight:
      type: object
      properties:
        id:
          type: string
          example: LH123
        origin:
          type: string
          example: Frankfurt
        destination:
          type: string
          example: New York
        price:
          type: number
          format: float
          example: 450
        currency:
          type: string
          example: EUR

    BookingRequest:
      type: object
      required:
        - flightId
        - customerName
      properties:
        flightId:
          type: string
          example: LH123
        customerName:
          type: string
          example: Max Mustermann

    Booking:
      type: object
      properties:
        bookingId:
          type: string
          example: F-7c1a9f
        flightId:
          type: string
          example: LH123
        customerName:
          type: string
          example: Max Mustermann
        status:
          type: string
          enum: [CONFIRMED]
          example: CONFIRMED
