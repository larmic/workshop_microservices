http:
  routers:
    flight:
      rule: "PathPrefix(`/api/flight`)"
      entryPoints:
        - web
      middlewares:
        - flight-stripprefix
      service: flight

    hotel:
      rule: "PathPrefix(`/api/hotel`)"
      entryPoints:
        - web
      middlewares:
        - hotel-stripprefix
      service: hotel

    car:
      rule: "PathPrefix(`/api/car`)"
      entryPoints:
        - web
      middlewares:
        - car-stripprefix
      service: car

    booking-story1:
      rule: "PathPrefix(`/api/booking-story1`)"
      entryPoints:
        - web
      middlewares:
        - booking-story1-stripprefix
      service: booking-story1

    booking-story2:
      rule: "PathPrefix(`/api/booking-story2`)"
      entryPoints:
        - web
      middlewares:
        - booking-story2-stripprefix
      service: booking-story2

    booking-story3:
      rule: "PathPrefix(`/api/booking-story3`)"
      entryPoints:
        - web
      middlewares:
        - booking-story3-stripprefix
      service: booking-story3

    root:
      rule: "Path(`/`)"
      entryPoints:
        - web
      service: dashboard

    dashboard:
      rule: "PathPrefix(`/dashboard`)"
      entryPoints:
        - web
      middlewares:
        - dashboard-stripprefix
      service: dashboard

    swagger-ui:
      rule: "PathPrefix(`/api`)"
      entryPoints:
        - web
      service: swagger-ui

    consul:
      rule: "PathPrefix(`/consul`)"
      entryPoints:
        - web
      service: consul

    consul-api:
      rule: "PathPrefix(`/v1`)"
      entryPoints:
        - web
      service: consul

  middlewares:
    flight-stripprefix:
      stripPrefix:
        prefixes:
          - "/api/flight"

    hotel-stripprefix:
      stripPrefix:
        prefixes:
          - "/api/hotel"

    car-stripprefix:
      stripPrefix:
        prefixes:
          - "/api/car"

    booking-story1-stripprefix:
      stripPrefix:
        prefixes:
          - "/api/booking-story1"

    booking-story2-stripprefix:
      stripPrefix:
        prefixes:
          - "/api/booking-story2"

    booking-story3-stripprefix:
      stripPrefix:
        prefixes:
          - "/api/booking-story3"

    dashboard-stripprefix:
      stripPrefix:
        prefixes:
          - "/dashboard"

  services:
    flight:
      loadBalancer:
        servers:
          - url: "http://flight:8080"

    hotel:
      loadBalancer:
        servers:
          - url: "http://hotel:8080"

    car:
      loadBalancer:
        servers:
          - url: "http://car:8080"

    booking-story1:
      loadBalancer:
        servers:
          - url: "http://booking-story1:8080"

    booking-story2:
      loadBalancer:
        servers:
          - url: "http://booking-story2:8080"

    booking-story3:
      loadBalancer:
        servers:
          - url: "http://booking-story3:8080"

    dashboard:
      loadBalancer:
        servers:
          - url: "http://dashboard:8080"

    swagger-ui:
      loadBalancer:
        servers:
          - url: "http://swagger-ui:8080"

    consul:
      loadBalancer:
        servers:
          - url: "http://consul:8500"
