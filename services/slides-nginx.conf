# Slides-Container: serviert statische Reveal.js-Slides.
# Access-Log nur bei Fehlern (4xx/5xx), Erfolgs-Requests bleiben still.
# Error-Log (interne Fehler, Worker-Probleme) bleibt unverändert über stderr.

map $status $loggable {
    ~^[23]  0;
    default 1;
}

server {
    listen       80;
    server_name  localhost;

    access_log /var/log/nginx/access.log combined if=$loggable;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
