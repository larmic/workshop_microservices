services:
  traefik:
    image: traefik:v3.7
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    depends_on:
      dashboard:
        condition: service_started

  consul:
    image: hashicorp/consul:1.22
    command: agent -dev -ui -client=0.0.0.0 -log-level=info -ui-content-path=/consul/
    ports:
      - "8500:8500"
    tmpfs:
      - /consul/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    attach: false
    ports:
      - "8084:8080"
    environment:
      BASE_URL: /api
      URLS: >-
        [
          { "url": "http://localhost/api/flight/openapi", "name": "Flight Service" },
          { "url": "http://localhost/api/hotel/openapi", "name": "Hotel Service" },
          { "url": "http://localhost/api/car/openapi", "name": "Car Service" },
          { "url": "http://localhost/api/booking-ref-story1/openapi", "name": "Booking Service (Reference Story 1)" },
          { "url": "http://localhost/api/booking-ref-story2/openapi", "name": "Booking Service (Reference Story 2)" },
          { "url": "http://localhost/api/booking-ref-story3/openapi", "name": "Booking Service (Reference Story 3)" },
          { "url": "http://localhost/api/booking-ref-story4/openapi", "name": "Booking Service (Reference Story 4)" },
          { "url": "http://localhost/api/booking-ref-story5/openapi", "name": "Booking Service (Reference Story 5)" },
          { "url": "http://localhost/api/booking-ref-story6/openapi", "name": "Booking Service (Reference Story 6)" },
          { "url": "http://localhost/api/booking-ref-story7/openapi", "name": "Booking Service (Reference Story 7)" },
          { "url": "http://localhost/api/booking-custom/openapi", "name": "Booking Service (Custom)" }
        ]

  slides:
    image: nginx:alpine
    volumes:
      - ./slides:/usr/share/nginx/html:ro

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    image: larmic/workshop-microservices-dashboard:latest
    environment:
      COMPOSE_PROJECT_NAME: services
      COMPOSE_FILES: "/compose/docker-compose.yml,/compose/docker-compose.infra.yml,/compose/docker-compose.reference.yml,/compose/docker-compose.custom.yml"
      BOOKING_CUSTOM_URL: http://booking-custom:8080
      FEEDBACK_WEBHOOK_URL: ${FEEDBACK_WEBHOOK_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/compose/docker-compose.yml:ro
      - ./docker-compose.infra.yml:/compose/docker-compose.infra.yml:ro
      - ./docker-compose.reference.yml:/compose/docker-compose.reference.yml:ro
      - ./docker-compose.custom.yml:/compose/docker-compose.custom.yml:ro