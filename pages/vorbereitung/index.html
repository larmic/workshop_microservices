<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <title>Vorbereitung &middot; Microservices richtig gemacht</title>
    <link rel="icon" type="image/png" href="../feedback/icon.png">
    <style>
        :root {
            --primary-dark: #0A0349;
            --primary-violet: #7348E1;
            --highlight: #D3F871;
            --wave: #EEE7FB;
            --line: #e0e0e6;
            --muted: #888;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--primary-dark);
            background: var(--primary-dark);
            background-image: linear-gradient(160deg, var(--primary-dark) 0%, #1a0d6e 100%);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 1.25rem;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
            max-width: 820px;
            width: 100%;
            padding: 1.5rem 2rem;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--line);
            font-size: 0.9rem;
        }
        .topbar .back {
            color: var(--primary-violet);
            text-decoration: none;
            font-weight: 700;
        }
        .topbar .back:hover { text-decoration: underline; }
        .doc-tabs { display: flex; gap: 0.5rem; }
        .doc-tabs a {
            padding: 0.3rem 0.8rem;
            border-radius: 999px;
            border: 1px solid var(--line);
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .doc-tabs a.active {
            background: var(--primary-dark);
            border-color: var(--primary-dark);
            color: #fff;
        }
        .doc-tabs a:not(.active):hover {
            background: var(--wave);
            border-color: var(--primary-violet);
        }

        /* Doku-Typografie für gerendertes Markdown */
        #content { line-height: 1.65; }
        #content h1 { font-size: 1.7rem; margin: 0.5rem 0 1rem; }
        #content h2 {
            font-size: 1.35rem;
            margin-top: 2.25rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid var(--line);
        }
        #content h3 { font-size: 1.1rem; margin-top: 1.5rem; }
        #content a { color: var(--primary-violet); }
        #content code {
            background: var(--wave);
            padding: 0.1rem 0.35rem;
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            font-size: 0.88em;
        }
        #content pre {
            background: var(--primary-dark);
            color: #e0e6f0;
            padding: 1rem 1.25rem;
            border-radius: 8px;
            overflow-x: auto;
        }
        #content pre code { background: none; color: inherit; padding: 0; }
        #content table {
            border-collapse: collapse;
            width: 100%;
            margin: 1rem 0;
            font-size: 0.92em;
        }
        #content th, #content td {
            border: 1px solid var(--line);
            padding: 0.45rem 0.65rem;
            text-align: left;
        }
        #content th { background: var(--primary-dark); color: #fff; }
        #content tbody tr:nth-child(even) { background: var(--wave); }
        #content blockquote {
            margin: 1rem 0;
            padding: 0.6rem 1rem;
            border-left: 4px solid var(--primary-violet);
            background: var(--wave);
            border-radius: 0 8px 8px 0;
        }
        #content blockquote p { margin: 0.25rem 0; }
        #content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid var(--line);
        }
        #content li:has(> input[type="checkbox"]) { list-style: none; margin-left: -1.2em; }
        #content li > input[type="checkbox"] {
            margin-right: 0.5em;
            accent-color: var(--primary-violet);
        }

        .status-box {
            padding: 1rem 1.25rem;
            border-radius: 8px;
            background: var(--wave);
        }
        .status-box.error { background: #fde0e0; color: #b3261e; }
        .status-box.error a { color: #b3261e; font-weight: 700; }

        /* Footer wie im Workshop-Dashboard */
        .workshop-footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #d0d7e2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: #555;
        }
        .workshop-footer .footer-author strong { color: #0A0349; }
        .workshop-footer .footer-author .accent {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            background: #CCF465;
            color: #0A0349;
            font-weight: 700;
            margin-right: 0.4rem;
        }
        .workshop-footer .footer-logo {
            height: 32px;
            width: auto;
            opacity: 0.8;
            transition: opacity 0.15s;
        }
        .workshop-footer .footer-logo:hover { opacity: 1; }
    </style>
</head>
<body>
    <main class="card" role="main">
        <div class="topbar">
            <a class="back" href="../">&larr; Zur &Uuml;bersicht</a>
            <nav class="doc-tabs" aria-label="Dokument w&auml;hlen">
                <a href="./" data-doc="vorbereitung.md">Vorbereitung</a>
                <a href="?doc=troubleshooting.md" data-doc="troubleshooting.md">Troubleshooting</a>
            </nav>
        </div>

        <noscript>
            <div class="status-box">
                Diese Seite ben&ouml;tigt JavaScript. Die Anleitung steht auch direkt im Repo:
                <a href="https://github.com/larmic/workshop_microservices/blob/main/docs/vorbereitung.md">docs/vorbereitung.md auf GitHub</a>
            </div>
        </noscript>

        <article id="content" aria-live="polite"></article>

        <footer class="workshop-footer">
            <div class="footer-author">
                <span class="accent">Workshop</span> von <strong>Lars Michaelis</strong>
            </div>
            <a href="https://www.team-neusta.de/" target="_blank" rel="noopener" aria-label="team neusta">
                <img class="footer-logo" src="../assets/team-neusta-logo.svg" alt="team neusta">
            </a>
        </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script>
        // Rendert docs/vorbereitung.md bzw. docs/troubleshooting.md client-seitig.
        // Die Markdown-Dateien werden im Pages-Build unverändert hierher kopiert,
        // Single Source of Truth bleibt docs/ im Repo.
        const REPO_BLOB = "https://github.com/larmic/workshop_microservices/blob/main/docs/";
        const DOCS = {
            "vorbereitung.md": "Workshop-Vorbereitung",
            "troubleshooting.md": "Troubleshooting"
        };

        // Doc-Auswahl per Query-Param mit harter Whitelist (kein Path-Traversal),
        // der Hash bleibt frei für Heading-Anker.
        const param = new URLSearchParams(location.search).get("doc");
        const doc = Object.prototype.hasOwnProperty.call(DOCS, param) ? param : "vorbereitung.md";
        document.title = DOCS[doc] + " · Microservices richtig gemacht";
        document.querySelectorAll(".doc-tabs a").forEach((a) => {
            if (a.dataset.doc === doc) a.classList.add("active");
        });

        const content = document.getElementById("content");

        function showError() {
            content.innerHTML = "";
            const box = document.createElement("div");
            box.className = "status-box error";
            box.innerHTML = "Die Anleitung konnte nicht geladen werden. Sie steht auch direkt im Repo: " +
                '<a href="' + REPO_BLOB + doc + '" rel="noopener">' + doc + " auf GitHub</a>";
            content.appendChild(box);
        }

        function slugify(text) {
            return text.toLowerCase()
                .replace(/[^a-z0-9äöüß\s-]/g, "")
                .trim()
                .replace(/\s+/g, "-");
        }

        function postProcess() {
            // Heading-Anker (marked v12 vergibt keine IDs mehr)
            content.querySelectorAll("h1, h2, h3, h4").forEach((h) => {
                h.id = slugify(h.textContent);
            });

            // Link-Rewriting: extern öffnen, Whitelist-Docs intern navigieren,
            // alle übrigen repo-relativen Links auf GitHub zeigen lassen.
            content.querySelectorAll("a").forEach((a) => {
                const raw = a.getAttribute("href") || "";
                if (/^(https?:|mailto:)/i.test(raw)) {
                    a.target = "_blank";
                    a.rel = "noopener";
                    return;
                }
                if (raw.startsWith("#")) return; // Heading-Anker im Dokument
                const clean = raw.replace(/^\.\//, "");
                const hashPos = clean.indexOf("#");
                const path = hashPos === -1 ? clean : clean.slice(0, hashPos);
                const hash = hashPos === -1 ? "" : clean.slice(hashPos);
                if (Object.prototype.hasOwnProperty.call(DOCS, path)) {
                    a.href = "?doc=" + path + hash;
                } else {
                    a.href = REPO_BLOB + clean;
                    a.target = "_blank";
                    a.rel = "noopener";
                }
            });

            // Bilder: lokal mitkopierte assets/ referenzieren, lazy laden
            content.querySelectorAll("img").forEach((img) => {
                const src = img.getAttribute("src") || "";
                if (!/^https?:/i.test(src)) img.src = "./" + src.replace(/^\.\//, "");
                img.loading = "lazy";
            });

            // Hash-Anker erst nach dem Rendern anspringen
            if (location.hash) {
                const target = document.getElementById(location.hash.slice(1));
                if (target) target.scrollIntoView();
            }
        }

        async function load() {
            if (typeof marked === "undefined") return showError(); // CDN nicht erreichbar
            content.innerHTML = '<div class="status-box">Lade Anleitung &hellip;</div>';
            try {
                const res = await fetch("./" + doc, { cache: "no-cache" });
                if (!res.ok) throw new Error("HTTP " + res.status);
                const md = await res.text();
                marked.setOptions({ gfm: true, breaks: false });
                content.innerHTML = marked.parse(md);
                postProcess();
            } catch (err) {
                showError();
            }
        }

        load();
    </script>
</body>
</html>
