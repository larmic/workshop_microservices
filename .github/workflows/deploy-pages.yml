name: Deploy Pages (Vorbereitung + Feedback + Slides)

on:
  push:
    branches: [main]
    paths:
      - 'pages/**'
      - 'services/slides/**'
      - 'docs/vorbereitung.md'
      - 'docs/troubleshooting.md'
      - 'docs/assets/**'
      - 'services/dashboard/static/icon.png'
      - 'services/dashboard/static/team-neusta-logo.svg'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      # Layout der Pages-Site zusammenbauen (statische Quellen liegen unter pages/):
      #   /              → Landing-Page (pages/landing/index.html)
      #   /vorbereitung/ → pages/vorbereitung/ + docs-Markdown (client-seitig gerendert)
      #   /feedback/     → pages/feedback/
      #   /slides/       → services/slides/ + benötigte dashboard-Assets
      #   /assets/       → seitenübergreifende Assets (Footer-Logo)
      - name: Build site layout
        run: |
          set -euo pipefail
          mkdir -p _site/feedback _site/slides/dashboard _site/vorbereitung/assets _site/assets
          cp -r pages/feedback/. _site/feedback/
          rsync -a --exclude='.DS_Store' --exclude='TODO.md' services/slides/ _site/slides/
          cp services/dashboard/static/icon.png _site/slides/dashboard/icon.png
          cp services/dashboard/static/team-neusta-logo.svg _site/slides/dashboard/team-neusta-logo.svg
          cp pages/vorbereitung/index.html _site/vorbereitung/index.html
          cp docs/vorbereitung.md _site/vorbereitung/vorbereitung.md
          cp docs/troubleshooting.md _site/vorbereitung/troubleshooting.md
          cp -r docs/assets/. _site/vorbereitung/assets/
          cp services/dashboard/static/team-neusta-logo.svg _site/assets/team-neusta-logo.svg
          cp pages/landing/index.html _site/index.html
          touch _site/.nojekyll
          # /dashboard/... -> ./dashboard/... im Slides-HTML. Lokal nutzt der
          # Nginx-Container Traefik-Routing zum Dashboard, auf Pages liegen die
          # Assets neben index.html im _site/slides/dashboard/.
          sed -i 's|"/dashboard/|"./dashboard/|g' _site/slides/index.html

      # Setzt den Webhook nur in das Build-Artefakt, nicht in den Repo-Stand.
      # Bricht hart ab, falls das Secret fehlt oder der Placeholder schon weg ist.
      - name: Inject Discord webhook URL
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::Secret DISCORD_WEBHOOK_URL ist nicht gesetzt. In Settings → Secrets and variables → Actions hinzufügen."
            exit 1
          fi
          python3 - <<'PYEOF'
          import os, pathlib, sys
          p = pathlib.Path("_site/feedback/index.html")
          content = p.read_text()
          placeholder = "__DISCORD_WEBHOOK_URL__"
          if placeholder not in content:
              sys.exit(f"ERROR: placeholder {placeholder} nicht in {p} gefunden")
          p.write_text(content.replace(placeholder, os.environ["DISCORD_WEBHOOK_URL"]))
          print(f"Webhook URL in {p} eingesetzt.")
          PYEOF

      - name: Upload _site as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
