name: Build Go-Services

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'

jobs:
  build-flight:
    name: Build FlightService
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/go.mod

      - name: Build
        run: go build -v -o bin/flight ./flight

  build-hotel:
    name: Build HotelService
    runs-on: ubuntu-latest
