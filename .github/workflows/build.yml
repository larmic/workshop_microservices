      - name: Build
        run: go build -v -o bin/booking-ref-story4 ./booking/story4

  build-booking-ref-story5:
    name: Build BookingService Reference Story5
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
