name: Build Services

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-flight:
    name: Build FlightService
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/go.mod

      - name: Build
        run: go build -v -o bin/flight ./flight

  build-hotel:
    name: Build HotelService
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/go.mod

      - name: Build
        run: go build -v -o bin/hotel ./hotel

  build-car:
    name: Build CarService
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/go.mod

      - name: Build
        run: go build -v -o bin/car ./car

  build-booking-ref-story1:
    name: Build BookingService Reference Story1
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/go.mod

      - name: Build
        run: go build -v -o bin/booking-ref-story1 ./booking/story1

  build-booking-ref-story2:
    name: Build BookingService Reference Story2
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/go.mod

      - name: Build
        run: go build -v -o bin/booking-ref-story2 ./booking/story2

  build-booking-ref-story3:
    name: Build BookingService Reference Story3
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/go.mod

      - name: Build
        run: go build -v -o bin/booking-ref-story3 ./booking/story3

  build-booking-ref-story4:
