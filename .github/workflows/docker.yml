name: Docker Build & Push Go-Services

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      # Folien gehören zur Pages-Pipeline (deploy-pages.yml), nicht zum Docker-Build
      - '!services/slides/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      flight: ${{ steps.filter.outputs.flight == 'true' || github.event_name == 'workflow_dispatch' }}
      hotel: ${{ steps.filter.outputs.hotel == 'true' || github.event_name == 'workflow_dispatch' }}
      car: ${{ steps.filter.outputs.car == 'true' || github.event_name == 'workflow_dispatch' }}
      booking: ${{ steps.filter.outputs.booking == 'true' || github.event_name == 'workflow_dispatch' }}
      booking-custom: ${{ steps.filter.outputs.booking-custom == 'true' || github.event_name == 'workflow_dispatch' }}
      dashboard: ${{ steps.filter.outputs.dashboard == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            flight:
              - 'services/flight/**'
              - 'services/shared/**'
              - 'services/go.mod'
              - 'services/go.sum'
              - 'services/Dockerfile'
            hotel:
              - 'services/hotel/**'
              - 'services/shared/**'
              - 'services/go.mod'
              - 'services/go.sum'
              - 'services/Dockerfile'
            car:
              - 'services/car/**'
              - 'services/shared/**'
              - 'services/go.mod'
              - 'services/go.sum'
              - 'services/Dockerfile'
            booking:
              - 'services/booking/story1/**'
              - 'services/booking/story2/**'
              - 'services/booking/story3/**'
              - 'services/booking/story4/**'
              - 'services/booking/story5/**'
              - 'services/booking/story6/**'
              - 'services/booking/story7/**'
              - 'services/shared/**'
              - 'services/go.mod'
              - 'services/go.sum'
              - 'services/Dockerfile'
            booking-custom:
              - 'services/booking/custom/**'
            dashboard:
              - 'services/dashboard/**'
              - 'services/shared/**'
              - 'services/go.mod'
              - 'services/go.sum'

  build-flight:
    needs: changes
    if: needs.changes.outputs.flight == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: services
          file: services/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            SERVICE_PATH=flight
            SERVICE_DESC=Workshop Microservices - Flight Service
            SERVICE_PORT=8081
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/workshop-microservices-flight:latest

  build-hotel:
    needs: changes
    if: needs.changes.outputs.hotel == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: services
          file: services/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            SERVICE_PATH=hotel
            SERVICE_DESC=Workshop Microservices - Hotel Service
            SERVICE_PORT=8082
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/workshop-microservices-hotel:latest

  build-car:
    needs: changes
    if: needs.changes.outputs.car == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: services
          file: services/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            SERVICE_PATH=car
            SERVICE_DESC=Workshop Microservices - Car Service
            SERVICE_PORT=8083
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/workshop-microservices-car:latest

  build-booking:
    needs: changes
    if: needs.changes.outputs.booking == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        story: [1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: services
          file: services/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            SERVICE_PATH=booking/story${{ matrix.story }}
            SERVICE_DESC=Workshop Microservices - Booking Service (Story ${{ matrix.story }})
            SERVICE_PORT=8080
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/workshop-microservices-booking:story${{ matrix.story }}

  build-dashboard:
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Easteregg-Webhook ist optional: ohne Secret baut das Image trotzdem,
      # die Discord-Benachrichtigung unterbleibt dann einfach.
      - name: Check easteregg webhook secret
        env:
          HOOK: ${{ secrets.DISCORD_EASTEREGG_WEBHOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::Secret DISCORD_EASTEREGG_WEBHOOK_URL ist nicht gesetzt - das Retro-Easteregg sendet keine Discord-Benachrichtigung."
          fi
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: services
          file: services/dashboard/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            DISCORD_EASTEREGG_WEBHOOK_URL=${{ secrets.DISCORD_EASTEREGG_WEBHOOK_URL }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/workshop-microservices-dashboard:latest

  build-booking-custom:
    needs: changes
    if: needs.changes.outputs.booking-custom == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: services/booking/custom
          file: services/booking/custom/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/workshop-microservices-booking:custom
