name: Docker Build & Push Go-Services

on:
  push:
    branches: [main]
    paths:
      - 'services/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      flight: ${{ steps.filter.outputs.flight }}
      hotel: ${{ steps.filter.outputs.hotel }}
      car: ${{ steps.filter.outputs.car }}
      booking-story1: ${{ steps.filter.outputs.booking-story1 }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            flight:
              - 'services/flight/**'
              - 'services/go.mod'
            hotel:
              - 'services/hotel/**'
              - 'services/go.mod'
            car:
              - 'services/car/**'
              - 'services/go.mod'
            booking-story1:
              - 'services/booking/story1/**'
              - 'services/go.mod'

  build-flight:
    needs: changes
    if: needs.changes.outputs.flight == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: services
          file: services/flight/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/workshop-microservices-flight:latest

  build-hotel:
    needs: changes
    if: needs.changes.outputs.hotel == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: services
          file: services/hotel/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/workshop-microservices-hotel:latest

  build-car:
    needs: changes
    if: needs.changes.outputs.car == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: services
          file: services/car/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/workshop-microservices-car:latest

  build-booking-story1:
    needs: changes
    if: needs.changes.outputs.booking-story1 == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: services
          file: services/booking/story1/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/workshop-microservices-booking-story1:latest
