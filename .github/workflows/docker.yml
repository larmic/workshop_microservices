name: Docker Build & Push Go-Services

on:
  push:
    branches: [main]
    paths:
      - 'services/**'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      flight: ${{ steps.filter.outputs.flight }}
      hotel: ${{ steps.filter.outputs.hotel }}
      car: ${{ steps.filter.outputs.car }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            flight:
              - 'services/flight/**'
              - 'services/go.mod'
            hotel:
              - 'services/hotel/**'
              - 'services/go.mod'
            car:
              - 'services/car/**'
              - 'services/go.mod'

  build-flight:
    needs: changes
    if: needs.changes.outputs.flight == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: services
          file: services/flight/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/workshop-microservices-flight:latest

  build-hotel:
    needs: changes
    if: needs.changes.outputs.hotel == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: services
          file: services/hotel/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/workshop-microservices-hotel:latest

  build-car:
    needs: changes
    if: needs.changes.outputs.car == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: services
          file: services/car/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/workshop-microservices-car:latest
