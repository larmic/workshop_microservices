name: Update Docker Hub descriptions

on:
  push:
    branches: [main]
    paths:
      - '.github/dockerhub/**'
      - '.github/workflows/dockerhub-description.yml'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: workshop-microservices-flight
            short: "Flight-Service (Go-REST-API). Demo-Image fuer den Microservices-Workshop."
            readme: .github/dockerhub/flight.md
          - image: workshop-microservices-hotel
            short: "Hotel-Service (Go-REST-API). Demo-Image fuer den Microservices-Workshop."
            readme: .github/dockerhub/hotel.md
          - image: workshop-microservices-car
            short: "Car-Service (Go-REST-API). Demo-Image fuer den Microservices-Workshop."
            readme: .github/dockerhub/car.md
          - image: workshop-microservices-booking-story1
            short: "Booking-Service Story 1: Cloud-Native (12-Factor, Health Checks). Workshop-Demo."
            readme: .github/dockerhub/booking-story1.md
          - image: workshop-microservices-booking-story2
            short: "Booking-Service Story 2: Service Discovery via Consul. Workshop-Demo."
            readme: .github/dockerhub/booking-story2.md
          - image: workshop-microservices-booking-story3
            short: "Booking-Service Story 3: Circuit Breaker. Workshop-Demo."
            readme: .github/dockerhub/booking-story3.md
          - image: workshop-microservices-booking-story4
            short: "Booking-Service Story 4: Bulkhead-Pattern. Workshop-Demo."
            readme: .github/dockerhub/booking-story4.md
          - image: workshop-microservices-booking-story5
            short: "Booking-Service Story 5: Saga (Orchestration). Workshop-Demo."
            readme: .github/dockerhub/booking-story5.md
          - image: workshop-microservices-booking-story6
            short: "Booking-Service Story 6: Saga (Choreography). Workshop-Demo."
            readme: .github/dockerhub/booking-story6.md
          - image: workshop-microservices-booking-story7
            short: "Booking-Service Story 7: Distributed Tracing. Workshop-Demo."
            readme: .github/dockerhub/booking-story7.md
          - image: workshop-microservices-dashboard
            short: "Dashboard-UI fuer den Microservices-Workshop. Demo-Image."
            readme: .github/dockerhub/dashboard.md
    steps:
      - uses: actions/checkout@v4
      - uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          short-description: ${{ matrix.short }}
          readme-filepath: ${{ matrix.readme }}
